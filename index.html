<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>orkut</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Trebuchet+MS:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        orkut: {
                            purple: '#9370DB',
                            light: '#E6E6FA',
                            yellow: '#FFCC00',
                            dark: '#4B0082',
                            bg: '#F2F2F2'
                        }
                    },
                    fontFamily: {
                        orkut: ['"Trebuchet MS"', 'Arial', 'sans-serif'],
                    },
                }
            }
        }

        // --- BANCO DE DADOS SIMULADO ---
        let currentUser = {};
        let allPosts = JSON.parse(localStorage.getItem('allPosts') || '[]');
        let allUsers = [
            {id: 1, name: "Ana Carolina", picture: "https://picsum.photos/seed/ana/100", email: "ana@email.com"},
            {id: 2, name: "Bruno Mendes", picture: "https://picsum.photos/seed/bruno/100", email: "bruno@email.com"},
            {id: 3, name: "Carla Souza", picture: "https://picsum.photos/seed/carla/100", email: "carla@email.com"},
            {id: 4, name: "Daniel Junior", picture: "https://picsum.photos/seed/daniel/100", email: "daniel@email.com"}
        ];
        let myFriends = [];
        let following = [];
        let pendingRequests = [];

        // --- FUNÇÕES PRINCIPAIS ---
        function handleCredentialResponse(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            currentUser = payload;
            
            // Adiciona o usuário atual na lista se não existir
            if(!allUsers.find(u => u.email === currentUser.email)) {
                allUsers.push({
                    id: Date.now(),
                    name: currentUser.name,
                    picture: currentUser.picture,
                    email: currentUser.email
                });
            }
            
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            
            updateUI();
            renderAllPosts();
        }

        function updateUI() {
            document.getElementById('profileName').innerText = currentUser.name;
            document.getElementById('profilePicture').src = currentUser.picture;
            document.getElementById('profileEmail').innerText = currentUser.email;
        }

        // --- SISTEMA DE POSTAGEM ---
        function togglePostBox() {
            const box = document.getElementById('postBox');
            box.classList.toggle('hidden');
        }

        function publishPost() {
            const text = document.getElementById('postText').value;
            const imageUrl = document.getElementById('postImageUrl').value;
            const videoUrl = document.getElementById('postVideoUrl').value;

            if(!text && !imageUrl && !videoUrl) {
                alert('Escreva algo ou adicione uma mídia!');
                return;
            }

            const postData = {
                id: 'post-' + Date.now(),
                text: text,
                image: imageUrl,
                video: videoUrl,
                user: {
                    name: currentUser.name,
                    picture: currentUser.picture,
                    email: currentUser.email
                },
                date: new Date().toISOString()
            };

            allPosts.unshift(postData);
            localStorage.setItem('allPosts', JSON.stringify(allPosts));
            
            renderPost(postData);
            clearPostBox();
        }

        function clearPostBox() {
            document.getElementById('postText').value = '';
            document.getElementById('postImageUrl').value = '';
            document.getElementById('postVideoUrl').value = '';
            document.getElementById('postBox').classList.add('hidden');
        }

        function renderPost(post) {
            const feed = document.getElementById('feedContainer');
            const isOwner = post.user.email === currentUser.email;

            const postElement = document.createElement('article');
            postElement.className = 'bg-white border rounded-lg shadow-sm post-item mb-4';
            postElement.id = post.id;
            postElement.innerHTML = `
                <div class="p-3 flex items-center justify-between">
                    <div class="flex items-center space-x-2">
                        <img src="${post.user.picture}" class="w-9 h-9 rounded-full object-cover" alt="User">
                        <span class="font-semibold text-sm">${post.user.name}</span>
                    </div>
                    ${isOwner ? `<i class="fa fa-ellipsis-h cursor-pointer text-gray-500" onclick="deletePost('${post.id}')"></i>` : '<div></div>'}
                </div>
                <div class="px-3 pb-3">
                    <p class="text-gray-800 whitespace-pre-wrap">${post.text}</p>
                </div>
                ${post.image ? `<div class="w-full"><img src="${post.image}" class="w-full object-cover" alt="Post image"></div>` : ''}
                ${post.video ? `<div class="w-full"><iframe class="w-full h-64" src="${post.video.replace('watch?v=', 'embed/')}" frameborder="0" allowfullscreen></iframe></div>` : ''}
                <div class="p-3">
                    <div class="flex justify-between items-center mb-2">
                        <div class="flex space-x-4">
                            <i class="fa fa-heart-o text-2xl cursor-pointer heart-btn heart-animation"></i>
                            <i class="fa fa-comment-o text-2xl cursor-pointer comment-btn"></i>
                        </div>
                    </div>
                    <p class="text-gray-400 text-xs mt-2 uppercase">Agora mesmo</p>
                </div>
            `;
            feed.insertBefore(postElement, feed.firstChild);
        }

        function deletePost(postId) {
            if(confirm('Tem certeza que deseja deletar este post?')) {
                allPosts = allPosts.filter(p => p.id !== postId);
                localStorage.setItem('allPosts', JSON.stringify(allPosts));
                document.getElementById(postId).remove();
            }
        }

        function renderAllPosts() {
            const feed = document.getElementById('feedContainer');
            feed.innerHTML = '';
            if(allPosts.length === 0) {
                feed.innerHTML = '<p class="text-center text-gray-500 py-10">Ainda não há publicações. Seja o primeiro a postar! ✨</p>';
                return;
            }
            allPosts.forEach(post => renderPost(post));
        }

        // --- BUSCA ---
        function openSearch() {
            switchView('searchView');
            renderRelevantPosts();
        }

        function renderRelevantPosts() {
            const container = document.getElementById('relevantContainer');
            container.innerHTML = '';
            allPosts.forEach(post => {
                const div = document.createElement('div');
                div.className = 'bg-white border rounded p-3 mb-3';
                div.innerHTML = `
                    <p class="font-semibold text-sm mb-1">${post.user.name}</p>
                    <p class="text-sm text-gray-700 mb-2">${post.text.substring(0, 100)}${post.text.length > 100 ? '...' : ''}</p>
                    ${post.image ? `<img src="${post.image}" class="w-full h-32 object-cover rounded mb-2">` : ''}
                `;
                container.appendChild(div);
            });
        }

        function searchPosts() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const items = document.querySelectorAll('#relevantContainer > div');
            items.forEach(item => {
                item.style.display = item.textContent.toLowerCase().includes(query) ? 'block' : 'none';
            });
        }

        // --- PERFIL ---
        function openProfile() {
            switchView('profileView');
            document.getElementById('profileBanner').src = currentUser.picture;
            document.getElementById('profileAvatar').src = currentUser.picture;
            document.getElementById('profileFullName').innerText = currentUser.name;
            document.getElementById('profileBio').innerText = `E-mail: ${currentUser.email}`;
        }

        // --- AMIGOS ---
        function openFriends() {
            switchView('friendsView');
            renderFriendsList();
        }

        function renderFriendsList() {
            const list = document.getElementById('friendsList');
            list.innerHTML = '';
            if(myFriends.length === 0) {
                list.innerHTML = '<p class="text-gray-500 text-sm">Você ainda não tem amigos.</p>';
            } else {
                myFriends.forEach(id => {
                    const friend = allUsers.find(u => u.id === id);
                    if(friend) {
                        const div = document.createElement('div');
                        div.className = 'flex items-center space-x-3 p-2 border-b';
                        div.innerHTML = `
                            <img src="${friend.picture}" class="w-10 h-10 rounded-full">
                            <span class="flex-1 text-sm font-semibold">${friend.name}</span>
                            <button class="text-xs bg-gray-200 px-2 py-1 rounded">Ver perfil</button>
                        `;
                        list.appendChild(div);
                    }
                });
            }
        }

        function openExplore() {
            switchView('exploreView');
            renderAllUsers();
        }

        function renderAllUsers() {
            const list = document.getElementById('usersList');
            list.innerHTML = '';
            
            allUsers.forEach(user => {
                if(user.email === currentUser.email) return; // Não mostra ele mesmo
                
                const isFriend = myFriends.includes(user.id);
                const isFollowing = following.includes(user.id);

                const div = document.createElement('div');
                div.className = 'flex items-center space-x-3 p-3 border-b';
                div.innerHTML = `
                    <img src="${user.picture}" class="w-12 h-12 rounded-full">
                    <div class="flex-1">
                        <p class="font-semibold text-sm">${user.name}</p>
                    </div>
                    ${isFriend 
                        ? `<button class="text-xs bg-green-100 text-green-800 px-2 py-1 rounded">Amigos</button>` 
                        : `<button onclick="addFriend(${user.id})" class="text-xs bg-orkut-purple text-white px-2 py-1 rounded">Solicitar</button>`
                    }
                    <button onclick="toggleFollow(${user.id})" class="text-xs border border-orkut-purple text-orkut-dark px-2 py-1 rounded ml-1">
                        ${isFollowing ? 'Seguindo' : 'Seguir'}
                    </button>
                `;
                list.appendChild(div);
            });
        }

        function addFriend(userId) {
            if(!myFriends.includes(userId) && !pendingRequests.includes(userId)) {
                pendingRequests.push(userId);
                alert('Solicitação enviada!');
                // Simulação: para ficar mútuo, já adiciona como amigo
                myFriends.push(userId);
                renderAllUsers();
                renderFriendsList();
            }
        }

        function toggleFollow(userId) {
            if(following.includes(userId)) {
                following = following.filter(id => id !== userId);
            } else {
                following.push(userId);
            }
            renderAllUsers();
        }

        // --- NAVEGAÇÃO ---
        function switchView(viewId) {
            document.getElementById('feedView').style.display = 'none';
            document.getElementById('searchView').style.display = 'none';
            document.getElementById('profileView').style.display = 'none';
            document.getElementById('friendsView').style.display = 'none';
            document.getElementById('exploreView').style.display = 'none';
            document.getElementById(viewId).style.display = 'block';
        }

        function backToFeed() {
            switchView('feedView');
        }

        window.onload = function() {
            if (typeof google !== 'undefined') {
                google.accounts.id.initialize({
                    client_id: "8393724573-kdnas52bjnhjvtkhahtqchm1p000b0i4.apps.googleusercontent.com",
                    callback: handleCredentialResponse
                });
                google.accounts.id.renderButton(
                    document.getElementById("buttonDiv"),
                    { theme: "outline", size: "large", text: "sign_in_with", shape: "rectangular" }
                });
            }
        }

    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .nav-logo-text {
                font-family: "Trebuchet MS", sans-serif;
                font-size: 22px;
                font-weight: bold;
                color: #9370DB;
                letter-spacing: -0.5px;
            }
            .heart-animation {
                transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            }
            .heart-active {
                color: #ED4956 !important;
                transform: scale(1.2);
            }
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 font-sans">

    <!-- TELA DE LOGIN -->
    <div id="loginScreen" class="fixed inset-0 z-[100] bg-white flex items-center justify-center">
        <div class="w-full max-w-md px-4">
            <div class="text-center mb-8">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6f/Orkut_Logo_2.png" class="h-16 mx-auto mb-3" alt="Logo Orkut">
                <p class="text-gray-500 mt-2">Conecte-se às pessoas que fazem a sua vida.</p>
            </div>
            <div id="buttonDiv" class="text-center"></div>
        </div>
    </div>

    <!-- CONTEÚDO PRINCIPAL -->
    <div id="mainContent" class="hidden pb-20">

        <!-- CABEÇALHO -->
        <nav class="fixed top-0 left-0 right-0 bg-white border-b border-gray-200 z-50 shadow-sm">
            <div class="max-w-6xl mx-auto px-4">
                <div class="flex justify-between items-center h-14">
                    <div class="flex-shrink-0 flex items-center gap-2 cursor-pointer" onclick="backToFeed()">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6f/Orkut_Logo_2.png" class="h-7 w-auto" alt="Logo Orkut">
                    </div>
                    <div class="flex items-center space-x-5">
                        <i class="fa fa-home text-xl cursor-pointer hover:text-orkut-purple" title="Início" onclick="backToFeed()"></i>
                        <i class="fa fa-users text-xl cursor-pointer hover:text-orkut-purple" title="Amigos" onclick="openFriends()"></i>
                        <i class="fa fa-user text-xl cursor-pointer hover:text-orkut-purple" title="Perfil" onclick="openProfile()"></i>
                    </div>
                </div>
            </div>
        </nav>

        <!-- CONTEÚDO -->
        <main class="max-w-2xl mx-auto pt-16 px-3">
            
            <!-- FEED -->
            <div
